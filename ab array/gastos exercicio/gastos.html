<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Calcule seus gastos</title>
  <link rel="stylesheet" href="gastos.css">
</head>

<body>

  <section class="container">
    <h1>Calcule seus gastos</h1>

    
    <form  method="get"  id="form">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" ><br><br>
      
        <label for="sobrenome">Sobrenome:</label>
        <input type="text" id="sobrenome" name="sobrenome" ><br><br>
      
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" name="peso" step="0.1" min="0" ><br><br>
      
        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" name="altura" step="0.01" min="0" ><br><br>
      
        <button type="submit">Enviar</button>
      </form>
  
  </section>

  <script src="asset.js"></script>
</body>

</html>
